<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Op - Rate Movies</title>
  <link rel="dns-prefetch" href="https://image.tmdb.org">
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="container">
        <h1 class="logo">Movie Op</h1>
        <div class="search-container">
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Search movies..."
            aria-label="Search movies"
          >
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <section id="moviesSection" aria-label="Movies">
          <h2 id="sectionTitle" class="section-title">Popular Movies</h2>

          <div id="loadingState" class="loading-state" role="status" aria-live="polite">
            <div class="spinner"></div>
            <p>Loading movies...</p>
          </div>

          <div id="errorState" class="error-state" role="alert" aria-live="assertive" hidden>
            <p class="error-message"></p>
            <button class="retry-button">Retry</button>
          </div>

          <div id="moviesGrid" class="movies-grid"></div>
        </section>
      </div>
    </main>

    <div id="movieModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <button class="modal-close" aria-label="Close modal">&times;</button>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
