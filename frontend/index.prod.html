<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Op - Rate Movies</title>
  <link rel="dns-prefetch" href="https://image.tmdb.org">
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
  <style>
    :root{--color-base:#0a0a0a;--color-surface:#141414;--color-text:#e8e8e8;--color-text-secondary:#8a8a8a;--color-text-tertiary:#5a5a5a;--color-warning:#d97706;--spacing-4:4px;--spacing-8:8px;--spacing-12:12px;--spacing-16:16px;--spacing-20:20px;--spacing-24:24px;--spacing-32:32px;--spacing-48:48px;--border-radius-sm:4px;--border-radius-md:6px;--transition-base:200ms cubic-bezier(0.4,0,0.2,1)}*{margin:0;padding:0;box-sizing:border-box}body{background-color:var(--color-base);color:var(--color-text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}#app{min-height:100vh}.container{max-width:1400px;margin:0 auto;padding:0 var(--spacing-24)}.header{background-color:var(--color-surface);padding:var(--spacing-20) 0;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}.header .container{display:flex;align-items:center;justify-content:space-between;gap:var(--spacing-24);flex-wrap:wrap}.logo{font-size:20px;font-weight:600;letter-spacing:-.02em}.search-container{flex:1;max-width:500px;min-width:200px}.search-input{width:100%;padding:var(--spacing-12) var(--spacing-16);background-color:var(--color-base);border:1px solid rgba(255,255,255,.08);border-radius:var(--border-radius-sm);color:var(--color-text);font-size:14px;transition:border-color var(--transition-base)}.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--spacing-48);gap:var(--spacing-16)}.spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--color-text-secondary);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <link rel="preload" href="css/styles.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="css/styles.min.css"></noscript>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="container">
        <h1 class="logo">Movie Op</h1>
        <div class="search-container">
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Search movies..."
            aria-label="Search movies"
          >
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <section id="moviesSection" aria-label="Movies">
          <h2 id="sectionTitle" class="section-title">Popular Movies</h2>

          <div id="loadingState" class="loading-state" role="status" aria-live="polite">
            <div class="spinner"></div>
            <p>Loading movies...</p>
          </div>

          <div id="errorState" class="error-state" role="alert" aria-live="assertive" hidden>
            <p class="error-message"></p>
            <button class="retry-button">Retry</button>
          </div>

          <div id="moviesGrid" class="movies-grid"></div>
        </section>
      </div>
    </main>

    <div id="movieModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <button class="modal-close" aria-label="Close modal">&times;</button>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>
  </div>
  <script type="module" src="js/app.min.js" defer></script>
</body>
</html>
